# fly.toml app configuration file for deploying to Fly.io

# Note: The app name will be automatically populated by Fly.io when you run 'fly launch' or 'fly deploy'
# If deploying via GitHub Actions, make sure to set your app name here.
app = "bodaarriagaochoa"

primary_region = "ams"

[env]
  PORT = "8080"

[build]
  # Uses the default Nixpacks/Buildpacks builder to automatically detect and build the Node.js project

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory_gb = 1

# Configure a persistent volume to store uploaded images, videos, and music forever
# To use this, create a volume first by running: fly volumes create wedding_data --region mia --size 1
[[mounts]]
  source = "wedding_data"
  destination = "/data"
